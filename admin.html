<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Jain Bafna & Associates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .hidden { display: none !important; }
        .table-responsive { max-height: 75vh; }
        .table th { cursor: pointer; user-select: none; }
        .table tbody tr { cursor: pointer; }
        .modal-body h6 {
            font-weight: bold;
            color: #4f46e5;
            margin-top: 1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-shield-lock-fill me-2"></i>Admin Dashboard
            </a>
            <div id="admin-auth-container" class="d-flex"></div>
        </div>
    </nav>

    <div class="container my-5">
        <!-- Login View for Admin -->
        <div id="admin-login-view" class="text-center p-5 bg-light rounded shadow-sm">
            <h1 class="fw-bold">Admin Access Required</h1>
            <p class="lead text-muted">Please sign in with your authorized Google account to view applications.</p>
            <div id="admin-auth-error" class="alert alert-danger hidden mt-3"></div>
            <button id="admin-signin-button" class="btn btn-primary btn-lg mt-3"><i class="bi bi-google me-2"></i> Sign in as Admin</button>
        </div>

        <!-- Admin Dashboard View (Initially Hidden) -->
        <div id="admin-dashboard-view" class="hidden">
            <h2 class="mb-4">Received Applications</h2>
            <div id="loading-spinner" class="text-center my-5"><div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"><span class="visually-hidden">Loading...</span></div></div>
            <div id="no-applications" class="alert alert-info hidden">No applications found.</div>
            <div id="applications-table-container" class="table-responsive bg-white rounded shadow-sm hidden">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark sticky-top">
                        <tr>
                            <th scope="col" data-sort="submittedAt">Date <i class="bi bi-arrow-down-up small"></i></th>
                            <th scope="col" data-sort="fullName">Name <i class="bi bi-arrow-down-up small"></i></th>
                            <th scope="col" data-sort="position">Position <i class="bi bi-arrow-down-up small"></i></th>
                            <th scope="col">Resume</th>
                            <th scope="col">Details</th>
                        </tr>
                    </thead>
                    <tbody id="applications-tbody">
                        <!-- Rows will be injected here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailsModalLabel">Application Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="detailsModalBody">
                    <!-- Details will be injected here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAl42YGxQuvN18as__VuYGvQXFlhpCKK2Y",
            authDomain: "jba-website-8a244.firebaseapp.com",
            projectId: "jba-website-8a244",
            storageBucket: "jba-website-8a244.firebasestorage.app",
            messagingSenderId: "183596323654",
            appId: "1:183596323654:web:ac45eb60032abfc8188b47",
            measurementId: "G-JMEGXLSZCR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = 'nitinjain@jainbafna.com';

        const loginView = document.getElementById('admin-login-view');
        const dashboardView = document.getElementById('admin-dashboard-view');
        const authContainer = document.getElementById('admin-auth-container');
        const detailsModal = new bootstrap.Modal(document.getElementById('detailsModal'));
        let applications = [];

        const updateUI = (user) => {
            authContainer.innerHTML = '';
            if (user && user.email === ADMIN_EMAIL) {
                loginView.classList.add('hidden');
                dashboardView.classList.remove('hidden');
                authContainer.innerHTML = `<span class="navbar-text me-3 text-white-50">Welcome, ${user.displayName}</span><button id="admin-signout-button" class="btn btn-sm btn-outline-light">Sign Out</button>`;
                document.getElementById('admin-signout-button').addEventListener('click', () => signOut(auth));
                fetchApplications();
            } else {
                loginView.classList.remove('hidden');
                dashboardView.classList.add('hidden');
                if (user) {
                     document.getElementById('admin-auth-error').textContent = 'Access Denied. Please sign in with the admin account.';
                     document.getElementById('admin-auth-error').classList.remove('hidden');
                     signOut(auth);
                }
            }
        };

        onAuthStateChanged(auth, updateUI);
        
        document.getElementById('admin-signin-button').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(error => {
                 document.getElementById('admin-auth-error').textContent = `Sign-in Error: ${error.message}`;
                 document.getElementById('admin-auth-error').classList.remove('hidden');
            });
        });

        const fetchApplications = async () => {
            try {
                const q = query(collection(db, "applications"), orderBy("submittedAt", "desc"));
                const querySnapshot = await getDocs(q);
                applications = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTable(applications);
            } catch (error) {
                console.error("Error fetching applications: ", error);
                alert('Could not fetch applications. You may not have permission. Check Firestore security rules.');
            } finally {
                document.getElementById('loading-spinner').classList.add('hidden');
            }
        };
        
        const renderTable = (data) => {
            const tbody = document.getElementById('applications-tbody');
            const tableContainer = document.getElementById('applications-table-container');
            const noAppsMessage = document.getElementById('no-applications');
            tbody.innerHTML = '';
            if (data.length === 0) {
                noAppsMessage.classList.remove('hidden');
                tableContainer.classList.add('hidden');
                return;
            }
            noAppsMessage.classList.add('hidden');
            tableContainer.classList.remove('hidden');

            data.forEach(app => {
                const row = tbody.insertRow();
                row.dataset.appId = app.id;
                const submittedDate = app.submittedAt ? app.submittedAt.toDate().toLocaleDateString() : 'N/A';
                const resumeLink = app.resumeUrl ? `<a href="${app.resumeUrl}" target="_blank" class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation()">View Resume</a>` : 'N/A';
                row.innerHTML = `
                    <td>${submittedDate}</td>
                    <td>${app.fullName || ''}</td>
                    <td>${app.position === 'article' ? 'Article Assistant' : 'Paid Assistant'}</td>
                    <td>${resumeLink}</td>
                    <td><button class="btn btn-sm btn-secondary view-details-btn">View Details</button></td>
                `;
            });
        };

        document.getElementById('applications-tbody').addEventListener('click', (e) => {
            if (e.target.classList.contains('view-details-btn')) {
                const appId = e.target.closest('tr').dataset.appId;
                const app = applications.find(a => a.id === appId);
                if (app) {
                    populateAndShowDetails(app);
                }
            }
        });

        const populateAndShowDetails = (app) => {
            const modalBody = document.getElementById('detailsModalBody');
            let referencesHtml = '<p>None provided.</p>';
            if (app.references && app.references.length > 0) {
                referencesHtml = '<dl class="row">';
                app.references.forEach((ref, index) => {
                    referencesHtml += `
                        <dt class="col-sm-3">Reference ${index + 1} Name</dt><dd class="col-sm-9">${ref.name || 'N/A'}</dd>
                        <dt class="col-sm-3">Relationship</dt><dd class="col-sm-9">${ref.relationship || 'N/A'}</dd>
                        <dt class="col-sm-3">Contact</dt><dd class="col-sm-9">${ref.contact || 'N/A'}</dd>
                        <dt class="col-sm-3">Email</dt><dd class="col-sm-9">${ref.email || 'N/A'}</dd>
                    `;
                    if(index < app.references.length - 1) referencesHtml += '<hr class="my-2">';
                });
                referencesHtml += '</dl>';
            }

            let experienceHtml = '';
            if(app.position === 'paid_assistant') {
                experienceHtml = `
                    <h6>Professional Experience</h6>
                    <dl class="row">
                        <dt class="col-sm-4">Current/Last Employer</dt><dd class="col-sm-8">${app.currentEmployer || 'N/A'}</dd>
                        <dt class="col-sm-4">Years of Experience</dt><dd class="col-sm-8">${app.yearsExperience || 'N/A'}</dd>
                        <dt class="col-sm-4">Current CTC</dt><dd class="col-sm-8">${app.currentSalary || 'N/A'}</dd>
                        <dt class="col-sm-4">Expected CTC</dt><dd class="col-sm-8">${app.expectedSalary || 'N/A'}</dd>
                    </dl>
                `;
            } else {
                 experienceHtml = `
                    <h6>Articleship Details</h6>
                    <dl class="row">
                        <dt class="col-sm-4">CA Inter Status</dt><dd class="col-sm-8">${app.caStatus || 'N/A'}</dd>
                        <dt class="col-sm-4">Expected Stipend</dt><dd class="col-sm-8">${app.expectedStipend || 'N/A'}</dd>
                        <dt class="col-sm-4">Prior Experience</dt><dd class="col-sm-8">${app.priorExperience || 'N/A'}</dd>
                    </dl>
                `;
            }

            modalBody.innerHTML = `
                <h6>Personal Information</h6>
                <dl class="row">
                    <dt class="col-sm-4">Full Name</dt><dd class="col-sm-8">${app.fullName}</dd>
                    <dt class="col-sm-4">Email</dt><dd class="col-sm-8">${app.email}</dd>
                    <dt class="col-sm-4">Mobile</dt><dd class="col-sm-8">${app.mobileNumber}</dd>
                    <dt class="col-sm-4">Address</dt><dd class="col-sm-8">${app.address}</dd>
                </dl>
                ${experienceHtml}
                <h6>Skills & Qualifications</h6>
                 <dl class="row">
                    <dt class="col-sm-4">Qualifications</dt><dd class="col-sm-8">${app.qualifications}</dd>
                    <dt class="col-sm-4">Accounting Platforms</dt><dd class="col-sm-8">${app.platforms.join(', ')}</dd>
                    <dt class="col-sm-4">MS Excel</dt><dd class="col-sm-8">${app.excelSkill}</dd>
                    <dt class="col-sm-4">MS Word</dt><dd class="col-sm-8">${app.wordSkill}</dd>
                    <dt class="col-sm-4">MS PowerPoint</dt><dd class="col-sm-8">${app.powerpointSkill}</dd>
                </dl>
                <h6>Motivation</h6>
                <p><b>Strengths & Weaknesses:</b><br>${app.strengthsWeaknesses}</p>
                <p><b>Contribution:</b><br>${app.contribution}</p>
                <h6>References</h6>
                ${referencesHtml}
            `;
            detailsModal.show();
        };
        
        // Sorting logic
        let sortDirection = { key: 'submittedAt', asc: false };
        document.querySelectorAll('th[data-sort]').forEach(header => {
            header.addEventListener('click', () => {
                const sortKey = header.dataset.sort;
                sortDirection.asc = (sortDirection.key === sortKey) ? !sortDirection.asc : true;
                sortDirection.key = sortKey;
                
                applications.sort((a, b) => {
                    let valA = a[sortKey];
                    let valB = b[sortKey];
                    if (sortKey === 'submittedAt') {
                        valA = a[sortKey]?.toMillis() || 0;
                        valB = b[sortKey]?.toMillis() || 0;
                    }
                    if (valA < valB) return sortDirection.asc ? -1 : 1;
                    if (valA > valB) return sortDirection.asc ? 1 : -1;
                    return 0;
                });
                renderTable(applications);
            });
        });

    </script>
</body>
</html>
